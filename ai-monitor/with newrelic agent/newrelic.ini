[newrelic]
# ====================================================================
# New Relic Python Agent Configuration
# ====================================================================

# Your New Relic ingestion license key. 
license_key = your_nr_ingest_license_key

# The application name as it will appear in the New Relic UI.
app_name = "OpenAI Minotiring Demo"

# Enables or disables the agent altogether.
monitor_mode = true

# Sets the level of detail for the local agent log file.
log_level = info

# The file path where log messages from the agent are written.
log_file = /tmp/newrelic-python-agent.log

# High Security Mode ensures the agent never collects raw query string parameters,
# request attributes, or message payloads before sending data to New Relic.
high_security = false

# ====================================================================
# Transaction Tracing and Performance Settings
# ====================================================================
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = apdex_f
transaction_tracer.record_sql = obsoleted
transaction_tracer.stack_trace_threshold = 0.5
transaction_tracer.explain_enabled = true
transaction_tracer.explain_threshold = 0.5

# ====================================================================
# Error Collector Settings
# ====================================================================
error_collector.enabled = true
error_collector.ignore_errors = 

# ====================================================================
# AI Monitoring Settings
# ====================================================================
# Explicitly ensures that AI monitoring telemetry, prompts, and token 
# counts are enabled and recorded by the application agent.
ai_monitoring.enabled = true
# Set to false if your data privacy policy requires blocking raw prompt 
# and response content strings from being sent to the New Relic UI.
ai_monitoring.record_content.enabled = true

# ====================================================================
# NOTE ON OPENAI ENVIRONMENT VARIABLES
# ====================================================================
# The OPENAI_API_KEY environment variable cannot be configured inside 
# the newrelic.ini file. You must continue to export it to your shell 
# environment or manage it via your Python application code:
# export OPENAI_API_KEY="your_openai_api_key"
# ====================================================================