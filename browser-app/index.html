<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Combined Example</title>
 
    <script lang="JavaScript">
        // Paste Javascript code from NewRelic here.
    </script>
 
</head>
<body>

<div class="container">
    <h1>Browser Monitoring Example</h1>

    <div class="mb-3">
    <label for="countrySelect" class="form-label">Select a Country</label>
    <select id="countrySelect" class="form-select">
        <option value="Australia">Australia</option>
        <option value="Canada">Canada</option>
        <option value="France">France</option>
        <option value="Germany">Germany</option>
        <option value="India">India</option>
        <option value="Iran">Iran</option>
        <option value="Spain">Spain</option>
    </select>
    </div>
   

    <div class="d-flex gap-2 mb-3">
    <button id="generateErrorButton" class="btn btn-danger">
        Generate JavaScript Error
    </button>

    <button id="getCountryInfoButton" class="btn btn-primary">
        Get Country Information
    </button>
</div>

<div id="countryInfo"></div>

</div>

<script>
    document.getElementById("generateErrorButton").addEventListener("click", function() {
        // This code deliberately generates an error (trying to call an undefined function)
        nonExistentFunction();
    });

    document.getElementById("getCountryInfoButton").addEventListener("click", function() {
        var countryName = $("#countrySelect").val();
        var apiUrl = `https://restcountries.com/v2/name/${countryName}`;

        $.ajax({
            url: apiUrl,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                var countryInfo = document.getElementById("countryInfo");
                if (response.length > 0) {
                    countryInfo.innerHTML = `
                        <h2>Country Information</h2>
                        <p>Country Name: ${response[0].name}</p>
                        <p>Capital: ${response[0].capital}</p>
                        <p>Population: ${response[0].population}</p>
                    `;
                } else {
                    countryInfo.innerHTML = "Country not found.";
                }
            },
            error: function(xhr, status, error) {
                console.error("Request failed with status:", xhr.status);
            }
        });
    });
</script>

</body>
</html>
